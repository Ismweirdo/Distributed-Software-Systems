spring:
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: ${SPRING_DATASOURCE_MASTER_URL:jdbc:mysql://127.0.0.1:3307/seckill_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${SPRING_DATASOURCE_MASTER_USERNAME:root}
          password: ${SPRING_DATASOURCE_MASTER_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave_1:
          url: ${SPRING_DATASOURCE_SLAVE1_URL:jdbc:mysql://127.0.0.1:3308/seckill_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${SPRING_DATASOURCE_SLAVE1_USERNAME:root}
          password: ${SPRING_DATASOURCE_SLAVE1_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave_2:
          url: ${SPRING_DATASOURCE_SLAVE2_URL:jdbc:mysql://127.0.0.1:3309/seckill_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${SPRING_DATASOURCE_SLAVE2_USERNAME:root}
          password: ${SPRING_DATASOURCE_SLAVE2_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
    elasticsearch:
      repositories:
        enabled: ${elasticsearch.enabled:false}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:${SPRING_DATA_ELASTICSEARCH_URIS:http://127.0.0.1:9200}}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init_user.sql,classpath:db/init_seckill_product.sql,classpath:db/init_order.sql
      data-locations: classpath:db/init_seckill_product_data.sql

  main:
    allow-circular-references: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        max.block.ms: 2000
        request.timeout.ms: 2000
        delivery.timeout.ms: 4000
      retries: 0
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.seckill.messaging
    listener:
      ack-mode: record

elasticsearch:
  enabled: ${ELASTICSEARCH_ENABLED:true}

seckill:
  datasource:
    mode: dynamic
  order:
    pending-ttl-seconds: 60
    failed-ttl-seconds: 120
  kafka:
    enabled: false
    send-timeout-ms: 1500
    topics:
      order-create: seckill.order.create
      order-pay: seckill.order.pay
    groups:
      order-create: seckill-order-create-group
      order-pay: seckill-order-pay-group

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8083
