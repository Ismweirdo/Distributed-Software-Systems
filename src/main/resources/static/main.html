<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀商城 - 控制台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/app-shell.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(160deg, #f4f7ff 0%, #eefaf4 100%);
            color: #1f2937;
        }
        .page { width: min(1120px, calc(100% - 28px)); margin: 18px auto 26px; display: grid; gap: 14px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 6px 20px rgba(15, 23, 42, .06); padding: 18px; }
        .hero { display: grid; gap: 14px; }
        .row { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .tag { display: inline-block; background: #e0ecff; color: #1d4ed8; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700; }
        h1 { margin: 8px 0 0; font-size: clamp(1.4rem, 3.2vw, 2rem); }
        .muted { color: #6b7280; line-height: 1.7; }
        .btn { border: 0; border-radius: 10px; padding: 9px 14px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn.primary { background: #2563eb; color: #fff; }
        .btn.secondary { background: #eff6ff; color: #1d4ed8; }
        .status-grid { display: grid; gap: 10px; }
        .status-grid.primary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .status-grid.secondary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .panel { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; }
        .panel-title { font-size: 13px; color: #334155; font-weight: 700; margin-bottom: 6px; }
        .panel-main { font-size: 1.05rem; color: #0f172a; font-weight: 700; }
        .panel-sub { margin-top: 6px; color: #64748b; font-size: 12px; line-height: 1.6; }
        .fold-toggle {
            display: none;
            border: 1px solid #dbe2f0;
            border-radius: 10px;
            background: #fff;
            color: #1d4ed8;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
        }
        .notice { border-radius: 10px; padding: 10px 12px; font-size: 14px; }
        .notice.info { background: #eff6ff; color: #1e40af; }
        .notice.ok { background: #ecfdf3; color: #166534; }
        ul { margin: 10px 0 0; padding-left: 18px; color: #4b5563; }
        @media (max-width: 900px) {
            .status-grid.primary,
            .status-grid.secondary { grid-template-columns: 1fr; }
        }
        @media (max-width: 760px) {
            .page { width: calc(100% - 16px); margin: 8px auto 14px; gap: 10px; }
            .card { padding: 14px; }
            .row { gap: 8px; }
            .row .btn { width: 100%; text-align: center; }
            .fold-toggle { display: inline-block; }
            .status-grid.secondary.mobile-hidden { display: none; }
        }
    </style>
</head>
<body class="ui-compact ui-motion">
<div id="app" class="page">
    <top-nav active="main" :username="username"></top-nav>

    <section class="card hero fx-enter" style="--enter-delay: 40ms;">
        <div class="row">
            <div>
                <span class="tag">USER CENTER</span>
                <h1>欢迎回来，{{ username || "游客" }}</h1>
                <p class="muted">这里可以快速进入商品页、订单页，并查看当前平台状态。</p>
            </div>
            <div class="row">
                <a class="btn primary" href="/products.html">进入秒杀专区</a>
                <a class="btn secondary" href="/orders.html">查看我的订单</a>
            </div>
        </div>
        <div class="status-grid primary">
            <div class="panel">
                <div class="panel-title">当前时间</div>
                <div class="panel-main">{{ nowText }}</div>
                <div class="panel-sub">每秒自动刷新。</div>
            </div>
            <div class="panel">
                <div class="panel-title">平台状态</div>
                <div class="panel-main" :class="{ 'fx-pulse': initOk }">{{ initStatusText }}</div>
                <div class="panel-sub">{{ initOk ? '服务正常，可下单。' : '状态不可用，请稍后重试。' }}</div>
            </div>
        </div>

        <button class="fold-toggle" type="button" @click="showSecondaryStatus = !showSecondaryStatus">
            {{ showSecondaryStatus ? '收起次级信息' : '展开次级信息' }}
        </button>

        <div class="status-grid secondary" :class="{ 'mobile-hidden': !showSecondaryStatus }">
            <div class="panel">
                <div class="panel-title">用户提示</div>
                <div class="panel-main">下单后关注订单页</div>
                <div class="panel-sub">订单状态会异步更新。</div>
            </div>
            <div class="panel">
                <div class="panel-title">登录会话</div>
                <div class="panel-main">{{ sessionHint }}</div>
                <div class="panel-sub">支持自动过期与退出登录。</div>
            </div>
        </div>
    </section>

    <section class="card fx-enter" style="--enter-delay: 120ms;">
        <div :class="['notice', initOk ? 'ok' : 'info']">{{ notice }}</div>
        <ul>
            <li v-for="line in healthLines" :key="line">{{ line }}</li>
        </ul>
    </section>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        components: {
            TopNav: SeckillUi.TopNav
        },
        data() {
            return {
                username: "",
                nowText: "--",
                notice: "正在加载平台状态...",
                initStatusText: "同步中",
                initOk: false,
                healthLines: [],
                showSecondaryStatus: false
            };
        },
        computed: {
            sessionHint() {
                const hours = Math.floor(SeckillUi.getSessionMaxAgeMs() / 3600000);
                return "登录有效期约 " + hours + " 小时";
            }
        },
        methods: {
            getUsername() {
                const byStorage = SeckillUi.getUsername();
                if (byStorage) return byStorage;
                const url = new URL(window.location.href);
                return url.searchParams.get("username") || "";
            },
            updateClock() {
                this.nowText = new Date().toLocaleString("zh-CN");
            },
            async loadInitStatus() {
                try {
                    const res = await fetch("/api/health/init-status");
                    const result = await res.json();
                    if (result.code !== 200 || !result.data) {
                        throw new Error(result.msg || "获取失败");
                    }
                    const data = result.data;
                    this.initOk = true;
                    this.initStatusText = "运行平稳";
                    this.notice = "系统运行正常，可放心参与秒杀。";
                    this.healthLines = [
                        "在售商品总数: " + (data.productCount ?? 0),
                        "本次启动是否触发导入: " + (data.seededThisStartup ? "是" : "否"),
                        "应用启动时间: " + (data.appStartupTime || "--")
                    ];
                } catch (e) {
                    this.initOk = false;
                    this.initStatusText = "部分信息不可用";
                    this.notice = "暂时无法获取平台状态，请稍后重试。";
                    this.healthLines = ["后端接口异常: " + (e.message || "未知错误")];
                }
            }
        },
        mounted() {
            if (!SeckillUi.ensureAuth({ requireToken: false })) {
                return;
            }
            this.username = this.getUsername();
            if (!this.username) {
                this.notice = "未检测到登录用户，即将返回登录页。";
                setTimeout(() => window.location.href = "/index.html", 1200);
                return;
            }
            localStorage.setItem(SeckillUi.STORAGE_KEYS.username, this.username);
            this.updateClock();
            this.loadInitStatus();
            window.setInterval(this.updateClock, 1000);
        }
    }).mount("#app");
</script>
</body>
</html>
