<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品秒杀系统 - 主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .welcome-text {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .feature-item:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(102,126,234,0.6);
        }

        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: block;
        }

        .feature-title {
            font-size: 1.1em;
            font-weight: bold;
        }

        .logout-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245,87,108,0.4);
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245,87,108,0.6);
        }

        .user-info {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 2px solid #c3e6cb;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 欢迎来到商品秒杀系统</h1>
        
        <div class="user-info" id="user-info">
            👤 用户：<span id="username-display">游客</span>，欢迎回来！
        </div>

        <p class="welcome-text">
            准备好抢购心仪的商品了吗？<br>
            海量优惠，限时秒杀，等你来抢！
        </p>

        <div class="features">
            <a href="/products.html" style="text-decoration: none;">
                <div class="feature-item">
                    <span class="feature-icon">⚡</span>
                    <div class="feature-title">限时秒杀</div>
                </div>
            </a>
            <div class="feature-item">
                <span class="feature-icon">🔥</span>
                <div class="feature-title">热门推荐</div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">💰</span>
                <div class="feature-title">超值优惠</div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🎁</span>
                <div class="feature-title">新品首发</div>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">
            <span style="margin-right: 8px;">🚪</span>退出登录
        </button>
    </div>

    <script>
        // 获取 URL 参数（如果有）
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // 设置用户名显示
        const username = localStorage.getItem('username') || getUrlParameter('username');
        if (username) {
            document.getElementById('username-display').textContent = username;
            localStorage.setItem('username', username);
        }

        // 退出登录函数
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('username');
                // 跳转回登录页
                window.location.href = '/index.html';
            }
        }

        // 功能卡片点击事件（示例）
        document.querySelectorAll('.feature-item').forEach(item => {
            item.addEventListener('click', function() {
                const title = this.querySelector('.feature-title').textContent;
                alert(`即将进入【${title}】页面，敬请期待！`);
            });
        });
    </script>
</body>
</html>
