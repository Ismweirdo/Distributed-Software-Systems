<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀商城 - 登录与注册</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/app-shell.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at 10% 20%, #eaf2ff, #f7fff9 70%);
            color: #111827;
        }
        #app {
            width: min(1120px, calc(100% - 24px));
            margin: 12px auto;
            display: grid;
            gap: 12px;
        }
        .shell {
            width: min(1120px, calc(100% - 24px));
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 12px;
            align-items: stretch;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, .07);
            padding: 18px;
        }
        .hero h1 { margin: 10px 0 0; line-height: 1.2; font-size: clamp(1.6rem, 3.6vw, 2.4rem); }
        .muted { color: #6b7280; line-height: 1.7; }
        .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 999px;
            padding: 4px 10px;
            font-weight: 700;
            font-size: 12px;
        }
        .hero-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .mini { border: 1px solid #e5e7eb; background: #f8fafc; border-radius: 12px; padding: 12px; }
        .mini strong { display: block; margin-bottom: 6px; }
        .tabbar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f3f4f6; padding: 6px; border-radius: 10px; }
        .tab { border: 0; border-radius: 8px; padding: 10px; cursor: pointer; font-weight: 600; background: transparent; }
        .tab.active { background: #2563eb; color: #fff; }
        .panel { margin-top: 14px; }
        .field { margin-bottom: 10px; }
        .field label { display: block; font-size: 13px; margin-bottom: 6px; color: #374151; font-weight: 700; }
        .field-row { display: flex; gap: 8px; align-items: center; }
        .input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 10px 12px;
            outline: none;
        }
        .input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
        .icon-btn {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #fff;
            color: #334155;
            cursor: pointer;
            padding: 10px 12px;
            white-space: nowrap;
            font-size: 13px;
        }
        .btn {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn:disabled { opacity: .7; cursor: wait; }
        .switch {
            margin-top: 10px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }
        .remember-row {
            margin-top: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #6b7280;
            font-size: 12px;
        }
        .remember-row label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .switch button { border: 0; background: transparent; color: #1d4ed8; cursor: pointer; font-weight: 700; }
        .message { margin-top: 10px; border-radius: 10px; padding: 9px 11px; font-size: 13px; }
        .message.info { background: #eff6ff; color: #1e40af; }
        .message.success { background: #dcfce7; color: #166534; }
        .message.error { background: #fee2e2; color: #991b1b; }
        .mini { transition: transform .2s ease, box-shadow .2s ease; }
        .mini:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15, 23, 42, .08); }
        .panel { animation: uiFadeUp .28s ease both; }
        @media (max-width: 900px) {
            .shell { grid-template-columns: 1fr; }
            .hero-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="ui-compact ui-motion">
<div id="app">
    <top-nav :active="navActive" mode="guest" :show-logout="false"></top-nav>

    <main class="shell">
    <section class="card hero fx-enter" style="--enter-delay: 40ms;">
        <span class="tag">秒杀商城</span>
        <h1>登录后进入秒杀专区<br>查看商品并提交订单</h1>
        <p class="muted">支持实时库存展示、异步下单与订单状态查询。</p>
        <div class="hero-grid">
            <div class="mini">
                <strong>极速体验</strong>
                <span class="muted">高并发场景下仍可稳定处理请求。</span>
            </div>
            <div class="mini">
                <strong>正品保障</strong>
                <span class="muted">商品信息、价格和库存均可直接查看。</span>
            </div>
            <div class="mini" style="grid-column: span 2;">
                <strong>新用户提示</strong>
                <span class="muted">注册成功后会自动进入控制台。</span>
            </div>
        </div>
    </section>

    <section class="card fx-enter" style="--enter-delay: 120ms;">
        <div class="tabbar" role="tablist" aria-label="登录注册切换">
            <button class="tab" :class="{active: tab==='login'}" @click="switchTab('login')">登录</button>
            <button class="tab" :class="{active: tab==='register'}" @click="switchTab('register')">注册</button>
        </div>

        <div class="panel" v-if="tab==='login'">
            <h2 style="margin:0 0 8px;">欢迎回来</h2>
            <p class="muted" style="margin:0 0 12px;">输入账号密码即可登录。</p>
            <div class="field">
                <label for="login-username">用户名</label>
                <input id="login-username" class="input" v-model.trim="login.username" autocomplete="username" placeholder="请输入用户名">
            </div>
            <div class="field">
                <label for="login-password">密码</label>
                <div class="field-row">
                    <input id="login-password" class="input" :type="loginPasswordVisible ? 'text' : 'password'" v-model.trim="login.password" autocomplete="current-password" placeholder="请输入密码" @keyup.enter="submitLogin">
                    <button type="button" class="icon-btn" @click="loginPasswordVisible = !loginPasswordVisible">{{ loginPasswordVisible ? '隐藏' : '显示' }}</button>
                </div>
            </div>
            <div class="remember-row">
                <label>
                    <input type="checkbox" v-model="rememberMe">
                    记住我的用户名
                </label>
                <span>按 Enter 可直接登录</span>
            </div>
            <button class="btn" :disabled="loginLoading" @click="submitLogin">{{ loginLoading ? '登录中...' : '登录并进入商城' }}</button>
            <div class="switch">还没有账号？<button @click="switchTab('register')">立即注册</button></div>
            <div v-if="loginMessage.text" :class="['message', loginMessage.type]">{{ loginMessage.text }}</div>
        </div>

        <div class="panel" v-else>
            <h2 style="margin:0 0 8px;">创建账号</h2>
            <p class="muted" style="margin:0 0 12px;">完成注册后将跳转到控制台。</p>
            <div class="field">
                <label for="reg-username">用户名</label>
                <input id="reg-username" class="input" v-model.trim="register.username" autocomplete="username" placeholder="建议 2-20 位，便于识别">
            </div>
            <div class="field">
                <label for="reg-password">密码</label>
                <input id="reg-password" class="input" type="password" v-model.trim="register.password" autocomplete="new-password" placeholder="至少 6 位">
            </div>
            <div class="field">
                <label for="reg-phone">手机号(可选)</label>
                <input id="reg-phone" class="input" v-model.trim="register.phone" autocomplete="tel" placeholder="11 位大陆手机号">
            </div>
            <button class="btn" :disabled="registerLoading" @click="submitRegister">{{ registerLoading ? '注册中...' : '注册并进入商城' }}</button>
            <div class="switch">已有账号？<button @click="switchTab('login')">直接登录</button></div>
            <div v-if="registerMessage.text" :class="['message', registerMessage.type]">{{ registerMessage.text }}</div>
        </div>
    </section>
    </main>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        components: {
            TopNav: SeckillUi.TopNav
        },
        data() {
            return {
                tab: "login",
                loginLoading: false,
                registerLoading: false,
                loginPasswordVisible: false,
                rememberMe: localStorage.getItem("seckill_remember_username") === "1",
                login: {
                    username: localStorage.getItem("seckill_username") || "",
                    password: ""
                },
                register: {
                    username: "",
                    password: "",
                    phone: ""
                },
                loginMessage: { type: "info", text: "" },
                registerMessage: { type: "info", text: "" }
            };
        },
        computed: {
            navActive() {
                return this.tab === "register" ? "register" : "index";
            }
        },
        methods: {
            switchTab(target) {
                this.tab = target;
                this.loginMessage.text = "";
                this.registerMessage.text = "";
            },
            normalizeMessage(raw, fallbackText) {
                if (typeof raw !== "string" || !raw.trim()) return fallbackText;
                return raw.trim();
            },
            setMessage(kind, type, text) {
                if (kind === "login") {
                    this.loginMessage = { type, text };
                    return;
                }
                this.registerMessage = { type, text };
            },
            goMain() {
                window.location.href = "/main.html";
            },
            validateRegister() {
                const payload = this.register;
                if (!payload.username || !payload.password) return "用户名和密码不能为空。";
                if (payload.username.length < 2 || payload.username.length > 20) return "用户名长度需在 2 到 20 位之间。";
                if (payload.password.length < 6) return "密码长度不能少于 6 位。";
                if (payload.phone && !/^1\d{10}$/.test(payload.phone)) return "手机号格式不正确，请输入 11 位大陆手机号。";
                return "";
            },
            async requestJson(url, options) {
                const response = await fetch(url, options);
                const contentType = response.headers.get("content-type") || "";
                if (!contentType.includes("application/json")) {
                    throw new Error("服务端返回的不是 JSON 数据");
                }
                return response.json();
            },
            async submitLogin() {
                if (!this.login.username || !this.login.password) {
                    this.setMessage("login", "error", "请输入用户名和密码。");
                    return;
                }
                this.loginLoading = true;
                this.setMessage("login", "info", "正在验证账号信息...");
                try {
                    const result = await this.requestJson("/api/users/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username: this.login.username, password: this.login.password })
                    });
                    if (result.code === 200) {
                        if (this.rememberMe) {
                            localStorage.setItem("seckill_remember_username", "1");
                        } else {
                            localStorage.removeItem("seckill_remember_username");
                        }
                        SeckillUi.saveSession(this.login.username, result.data || "");
                        this.setMessage("login", "success", "登录成功，正在进入商城主页...");
                        this.login.password = "";
                        setTimeout(this.goMain, 800);
                        return;
                    }
                    this.setMessage("login", "error", "登录失败: " + this.normalizeMessage(result.msg, "请检查账号或密码。"));
                } catch (e) {
                    this.setMessage("login", "error", "登录请求失败，请确认后端服务已启动。");
                } finally {
                    this.loginLoading = false;
                }
            },
            async submitRegister() {
                const errorText = this.validateRegister();
                if (errorText) {
                    this.setMessage("register", "error", errorText);
                    return;
                }
                this.registerLoading = true;
                this.setMessage("register", "info", "正在创建账号...");
                try {
                    const result = await this.requestJson("/api/users/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(this.register)
                    });
                    if (result.code === 200) {
                        SeckillUi.saveSession(this.register.username, "");
                        this.setMessage("register", "success", "注册成功，正在进入商城主页...");
                        this.register = { username: "", password: "", phone: "" };
                        setTimeout(this.goMain, 900);
                        return;
                    }
                    this.setMessage("register", "error", "注册失败: " + this.normalizeMessage(result.msg, "请稍后重试。"));
                } catch (e) {
                    this.setMessage("register", "error", "注册请求失败，请确认后端服务已启动。");
                } finally {
                    this.registerLoading = false;
                }
            }
        },
        mounted() {
            const hint = SeckillUi.readLoginHint();
            if (hint) {
                this.setMessage("login", "info", hint);
            }
        }
    }).mount("#app");
</script>
</body>
</html>
