<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀商城 - 我的订单</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/js/app-shell.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f3f6ff; color: #111827; }
        .page { width: min(1080px, calc(100% - 28px)); margin: 18px auto 30px; display: grid; gap: 12px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; box-shadow: 0 6px 20px rgba(15, 23, 42, .05); }
        .hero { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 16px; }
        .muted { color: #6b7280; }
        .btn { border: 0; border-radius: 10px; padding: 9px 14px; background: #eaf2ff; color: #1d4ed8; cursor: pointer; text-decoration: none; }
        .message { padding: 10px 12px; border-radius: 10px; margin: 0 0 4px; }
        .message.error { background: #fee2e2; color: #991b1b; }
        .message.info { background: #eff6ff; color: #1e40af; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .chips { display: flex; gap: 6px; flex-wrap: wrap; }
        .chip { border: 1px solid #dbe2f0; border-radius: 999px; background: #fff; color: #1d4ed8; padding: 5px 10px; font-size: 12px; cursor: pointer; transition: all .2s ease; }
        .chip.active { background: #2563eb; border-color: #2563eb; color: #fff; }
        .list { display: grid; gap: 10px; padding: 12px; }
        .item { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; transition: transform .2s ease, box-shadow .2s ease; animation: uiFadeUp .35s ease both; }
        .item:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15,23,42,.08); }
        .head { display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px dashed #e5e7eb; padding-bottom: 8px; }
        .status { padding: 2px 10px; border-radius: 999px; font-size: 12px; background: #dcfce7; color: #166534; transition: transform .2s ease; }
        .status.failed { background: #fee2e2; color: #991b1b; }
        .body { display: flex; justify-content: space-between; gap: 10px; align-items: center; padding-top: 10px; }
        .price { font-size: 1.25rem; font-weight: 800; color: #2563eb; }
        .empty { padding: 24px; text-align: center; color: #6b7280; }
        @media (max-width: 760px) {
            .page { width: calc(100% - 14px); margin: 8px auto 14px; gap: 10px; }
            .hero { flex-direction: column; align-items: flex-start; padding: 12px; }
            .btn { width: 100%; text-align: center; }
            .chip { flex: 1; text-align: center; }
        }
    </style>
</head>
<body class="ui-compact ui-motion">
<div id="app" class="page">
    <top-nav active="orders" :username="username"></top-nav>

    <section class="card hero fx-enter" style="--enter-delay: 30ms;">
        <div>
            <h1 style="margin:0;">我的订单</h1>
            <div class="muted">查看订单处理状态</div>
        </div>
        <a href="/main.html" class="btn">返回控制台</a>
    </section>

    <section class="card fx-enter" style="padding:12px; --enter-delay: 110ms;">
        <div class="toolbar">
            <div class="chips">
                <button v-for="item in statusFilters" :key="item.key" class="chip" :class="{active: activeStatus===item.key}" @click="activeStatus=item.key">{{ item.label }}</button>
            </div>
            <div class="muted" style="font-size:12px;">最近更新时间: {{ lastUpdated }}</div>
        </div>
        <div v-if="message" :class="['message', messageType]">{{ message }}</div>
        <div v-if="loading" class="empty">订单加载中...</div>
        <div v-else-if="filteredOrders.length === 0" class="empty">暂无符合筛选条件的订单。</div>
        <div v-else class="list">
            <article class="item" v-for="order in filteredOrders" :key="order.orderId">
                <div class="head">
                    <div>订单号: <strong>{{ order.orderId }}</strong></div>
                    <span :class="['status', order.orderStatus === 'FAILED' ? 'failed' : '']">{{ statusText(order.orderStatus) }}</span>
                </div>
                <div class="body">
                    <div>
                        <div><strong>商品ID:</strong> {{ order.productId }}</div>
                        <div class="muted" style="font-size:13px;margin-top:6px;">创建时间: {{ formatDate(order.createTime) }}</div>
                    </div>
                    <div class="price">¥{{ formatMoney(order.orderAmount) }}</div>
                </div>
            </article>
        </div>
    </section>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        components: {
            TopNav: SeckillUi.TopNav
        },
        data() {
            return {
                username: "",
                orders: [],
                loading: true,
                message: "",
                messageType: "message info",
                activeStatus: "ALL",
                lastUpdated: "--",
                statusFilters: [
                    { key: "ALL", label: "全部" },
                    { key: "CREATED", label: "已创建" },
                    { key: "PAID", label: "已支付" },
                    { key: "FAILED", label: "失败" }
                ]
            };
        },
        computed: {
            filteredOrders() {
                if (this.activeStatus === "ALL") {
                    return this.orders;
                }
                return this.orders.filter((order) => String(order.orderStatus || "") === this.activeStatus);
            }
        },
        methods: {
            getLoginToken() {
                return SeckillUi.getToken();
            },
            formatMoney(value) {
                return Number(value || 0).toFixed(2);
            },
            formatDate(value) {
                if (!value) return "--";
                return new Date(String(value).replace(" ", "T")).toLocaleString("zh-CN");
            },
            statusText(status) {
                if (status === "CREATED") return "已创建";
                if (status === "PAID") return "已支付";
                if (status === "FAILED") return "失败";
                return status || "处理中";
            },
            async loadOrders() {
                this.loading = true;
                this.message = "";
                const token = this.getLoginToken();
                if (!token) {
                    this.loading = false;
                    this.messageType = "message error";
                    this.message = "请先登录后再查看订单";
                    return;
                }
                try {
                    const res = await fetch("/api/orders/user", { headers: { "X-Login-Token": token } });
                    const result = await res.json();
                    if (result.code !== 200 || !Array.isArray(result.data)) {
                        throw new Error(result.msg || "订单加载异常");
                    }
                    this.orders = result.data;
                    this.lastUpdated = new Date().toLocaleString("zh-CN");
                    this.messageType = "message info";
                    this.message = "共加载 " + this.orders.length + " 条订单记录";
                } catch (e) {
                    this.messageType = "message error";
                    this.message = "加载订单失败: " + (e.message || "未知错误");
                } finally {
                    this.loading = false;
                }
            }
        },
        mounted() {
            if (!SeckillUi.ensureAuth({ requireToken: true })) {
                return;
            }
            this.username = SeckillUi.getUsername();
            this.loadOrders();
        }
    }).mount("#app");
</script>
</body>
</html>
