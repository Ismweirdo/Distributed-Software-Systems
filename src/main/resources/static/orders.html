<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀商城 - 我的订单</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --line: #e3e8f1;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-strong: #1d4ed8;
            --success: #16a34a;
            --radius: 14px;
            --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .page {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 32px;
        }

        .hero {
            padding: 18px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .hero-left h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }

        .hero-left p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
            border: 1px solid #d1d5db;
            color: #374151;
        }

        .btn:hover {
            background: #f8fafc;
        }

        .message {
            margin-bottom: 14px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-item {
            padding: 16px;
            border-radius: var(--radius);
            background: var(--card);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
            font-size: 14px;
            color: var(--muted);
        }

        .order-header strong {
            color: var(--text);
            font-size: 16px;
        }

        .status {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: #ecfdf3;
            color: #166534;
        }

        .order-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
        }

        .empty {
            padding: 40px;
            text-align: center;
            border-radius: var(--radius);
            background: var(--card);
            border: 1px solid var(--line);
            color: var(--muted);
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <div class="hero-left">
            <h1>我的订单</h1>
            <p>查看参与秒杀活动的订单记录</p>
        </div>
        <a href="/main.html" class="btn">返回主页</a>
    </section>

    <div id="message" class="message"></div>

    <div id="order-container" class="order-list">
        <div class="empty">加载中...</div>
    </div>
</main>

<script>
    const API_BASE = "/api/orders";
    const STORAGE_KEYS = {
        token: "seckill_login_token"
    };

    const orderContainer = document.getElementById("order-container");
    const messageBox = document.getElementById("message");

    const UI_TEXT = {
        empty: "暂无订单，去秒杀页看看吧。",
        loadFailed: "加载订单失败"
    };

    function getUserId() {
        const token = localStorage.getItem(STORAGE_KEYS.token);
        if (token && token.startsWith("login_success_")) {
            return token.replace("login_success_", "");
        }
        return "1";
    }

    function showMessage(type, text) {
        messageBox.textContent = text;
        messageBox.className = "message show " + type;
    }

    function renderEmpty(text) {
        orderContainer.innerHTML = '<div class="empty">' + text + '</div>';
    }

    function formatMoney(value) {
        return Number(value || 0).toFixed(2);
    }

    function formatDate(val) {
        if(!val) return '--';
        return new Date(String(val).replace(" ", "T")).toLocaleString('zh-CN');
    }

    async function loadOrders() {
        const userId = getUserId();
        try {
            const res = await fetch(API_BASE + "/user?userId=" + userId);
            const result = await res.json();

            if (result.code !== 200 || !Array.isArray(result.data)) {
                throw new Error(result.msg || "订单加载异常");
            }

            const orders = result.data;
            if (orders.length === 0) {
                renderEmpty(UI_TEXT.empty);
                return;
            }

            orderContainer.innerHTML = orders.map(order => `
                <div class="order-item">
                    <div class="order-header">
                        <span>订单号：<strong>${order.orderId}</strong></span>
                        <span class="status">${order.orderStatus === 'CREATED' ? '已创建' : order.orderStatus}</span>
                    </div>
                    <div class="order-body">
                        <div>
                            <div style="font-weight: 700; margin-bottom: 6px;">商品ID: ${order.productId}</div>
                            <div style="font-size: 13px; color: var(--muted);">创建时间: ${formatDate(order.createTime)}</div>
                        </div>
                        <div class="price">¥${formatMoney(order.orderAmount)}</div>
                    </div>
                </div>
            `).join("");

        } catch (error) {
            orderContainer.innerHTML = '';
            showMessage('error', UI_TEXT.loadFailed + "：" + error.message);
        }
    }

    loadOrders();
</script>
</body>
</html>
