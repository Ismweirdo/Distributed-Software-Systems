# ==================== 负载均衡配置 ====================

# 1. 轮询（默认）- Round Robin
upstream seckill-backend-roundrobin {
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
}

# 2. 权重配置 - Weighted Round Robin
# 根据服务器性能分配不同权重
upstream seckill-backend-weighted {
    server 127.0.0.1:8081 weight=3;  # 高性能服务器，处理 75% 请求
    server 127.0.0.1:8082 weight=1;  # 低性能服务器，处理 25% 请求
}

# 3. IP Hash - 同一 IP 的请求固定到同一台服务器
# 用于解决 Session 共享问题
upstream seckill-backend-iphash {
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    ip_hash;
}

# 4. Least Conn - 最少连接数优先
# 将请求分配到当前连接数最少的服务器
upstream seckill-backend-leastconn {
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    least_conn;
}

# 5. URL Hash - 相同 URL 的请求固定到同一台服务器
# 提高缓存命中率
upstream seckill-backend-urlhash {
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    hash $request_uri;
}

# ==================== 动静分离配置 ====================

server {
    listen 80;
    server_name localhost;

    # ========== 静态资源服务（动静分离）==========
    
    # HTML 文件
    location / {
        root D:/CreatorProject/seckill-system/src/main/resources/static;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # 静态文件缓存配置
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
    
    # CSS 文件
    location ~* \.css$ {
        root D:/CreatorProject/seckill-system/src/main/resources/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
    }
    
    # JS 文件
    location ~* \.js$ {
        root D:/CreatorProject/seckill-system/src/main/resources/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
    }
    
    # 图片文件
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        root D:/CreatorProject/seckill-system/src/main/resources/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
    }
    
    # 字体文件
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        root D:/CreatorProject/seckill-system/src/main/resources/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== API 接口代理（负载均衡）==========
    
    # 使用轮询算法（默认）
    location /api/ {
        proxy_pass http://seckill-backend-roundrobin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 重试配置
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        
        # 添加响应头，显示后端服务器信息（用于调试）
        add_header X-Upstream-Server $upstream_addr;
    }
    
    # 使用 IP Hash 算法（需要时切换）
    # location /api/ {
    #     proxy_pass http://seckill-backend-iphash;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
    
    # 使用最少连接数算法（需要时切换）
    # location /api/ {
    #     proxy_pass http://seckill-backend-leastconn;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}